<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Plan">
<meta name="theme-color" content="#ffffff">
<title>Training &amp; Meal Plan</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{
    --bg:#f5f5f5;--card:#fff;--card2:#f9f9f9;--border:#e5e5e5;--border2:#d0d0d0;
    --txt:#111;--txt2:#555;--txt3:#999;
    --acc:#2563eb;--acc-bg:#eff6ff;--acc-txt:#1d4ed8;
    --grn:#059669;--grn-bg:#ecfdf5;--grn-txt:#065f46;
    --amb:#d97706;--amb-bg:#fffbeb;--amb-txt:#92400e;
    --rad:14px;--pad:16px;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#0f0f0f;--card:#1c1c1e;--card2:#2c2c2e;--border:#3a3a3c;--border2:#545456;
      --txt:#f5f5f5;--txt2:#aeaeb2;--txt3:#636366;
      --acc:#3b82f6;--acc-bg:#1e3a5f;--acc-txt:#93c5fd;
      --grn:#10b981;--grn-bg:#064e3b;--grn-txt:#6ee7b7;
      --amb:#f59e0b;--amb-bg:#451a03;--amb-txt:#fcd34d;
    }
  }
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--bg);color:var(--txt);min-height:100dvh;padding-bottom:env(safe-area-inset-bottom);}
  h1,h2,h3,h4,p,ul,li{margin:0;padding:0;}

  /* Header */
  .header{background:var(--card);border-bottom:1px solid var(--border);padding:calc(env(safe-area-inset-top) + 12px) var(--pad) 12px;position:sticky;top:0;z-index:10;}
  .header-row{display:flex;align-items:center;justify-content:space-between;}
  .header-title{font-size:17px;font-weight:600;color:var(--txt);}
  .nav-btn{background:none;border:none;color:var(--acc);font-size:17px;padding:4px 2px;cursor:pointer;-webkit-appearance:none;}
  .week-dots{display:flex;gap:6px;justify-content:center;margin-top:8px;}
  .wdot{width:7px;height:7px;border-radius:50%;background:var(--border2);border:none;padding:0;cursor:pointer;}
  .wdot.on{background:var(--acc);}

  /* Toggles */
  .tog-row{display:flex;gap:8px;padding:10px var(--pad) 0;}
  .tog{flex:1;padding:8px;border-radius:10px;border:1px solid var(--border);background:var(--card);font-size:13px;font-weight:500;color:var(--txt2);cursor:pointer;-webkit-appearance:none;}
  .tog.on{background:var(--acc-bg);color:var(--acc-txt);border-color:var(--acc);}

  /* Stats */
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px var(--pad);}
  .stat{background:var(--card);border-radius:12px;padding:10px 12px;border:1px solid var(--border);}
  .stat-val{font-size:18px;font-weight:600;color:var(--txt);}
  .stat-lbl{font-size:11px;color:var(--txt3);margin-top:2px;}

  /* Legend */
  .legend{display:flex;flex-wrap:wrap;gap:6px;padding:0 var(--pad) 8px;}
  .leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--txt2);}
  .ld{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

  /* Calendar */
  .cal-wrap{padding:0 var(--pad) 12px;}
  .day-heads{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;}
  .dh{font-size:10px;color:var(--txt3);text-align:center;font-weight:500;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .row-label{font-size:10px;color:var(--txt3);font-weight:500;padding:6px 0 2px;letter-spacing:.04em;}
  .cal-row{display:grid;gap:4px;}
  .cal-row-1{grid-template-columns:repeat(4,1fr);}
  .cal-row-2{grid-template-columns:repeat(3,1fr);}
  .dc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:6px 4px;cursor:pointer;min-height:90px;-webkit-appearance:none;text-align:left;width:100%;}
  .dc.sel{border-color:var(--acc);background:var(--acc-bg);}
  .dnum{font-size:9px;color:var(--txt3);margin-bottom:3px;font-weight:500;}
  .tb{border-radius:5px;padding:3px 4px;margin-bottom:2px;}
  .tb-rest{background:#f1f0ee;} .tb-recovery{background:#ecfdf5;} .tb-aerobic{background:#eff6ff;}
  .tb-speed{background:#fff1ee;} .tb-soccer{background:#f0effe;} .tb-match{background:#fffbeb;}
  @media(prefers-color-scheme:dark){
    .tb-rest{background:#2c2c2a;} .tb-recovery{background:#064e3b;} .tb-aerobic{background:#1e3a5f;}
    .tb-speed{background:#3d1a0f;} .tb-soccer{background:#1e1a4f;} .tb-match{background:#3d2a00;}
  }
  .tl{font-size:9px;font-weight:600;line-height:1.2;}
  .tb-rest .tl{color:#5f5e5a;} .tb-recovery .tl{color:#065f46;} .tb-aerobic .tl{color:#1d4ed8;}
  .tb-speed .tl{color:#9a3412;} .tb-soccer .tl{color:#3730a3;} .tb-match .tl{color:#92400e;}
  @media(prefers-color-scheme:dark){
    .tb-rest .tl{color:#aeaeb2;} .tb-recovery .tl{color:#6ee7b7;} .tb-aerobic .tl{color:#93c5fd;}
    .tb-speed .tl{color:#fca5a5;} .tb-soccer .tl{color:#c4b5fd;} .tb-match .tl{color:#fcd34d;}
  }
  .ts{font-size:8px;color:var(--txt3);}
  .mb{margin-top:2px;}
  .mn{font-size:9px;font-weight:500;color:var(--txt);line-height:1.3;}
  .mm{font-size:8px;color:var(--txt3);}
  .fdot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:2px;vertical-align:middle;flex-shrink:0;}

  /* Detail sheet */
  .sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:20;display:none;}
  .sheet-overlay.open{display:block;}
  .sheet{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:20px 20px 0 0;z-index:21;max-height:88dvh;overflow-y:auto;padding:0 0 calc(env(safe-area-inset-bottom)+16px);transform:translateY(100%);transition:transform .32s cubic-bezier(.32,1,.23,1);display:none;}
  .sheet.open{display:block;transform:translateY(0);}
  .sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 14px;}
  .sheet-inner{padding:0 var(--pad);}
  .sheet-title{font-size:17px;font-weight:600;color:var(--txt);margin-bottom:2px;}
  .sheet-sub{font-size:13px;color:var(--txt2);margin-bottom:14px;}
  .sec-head{font-size:11px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
  .tbox{background:var(--card2);border-radius:12px;padding:12px;margin-bottom:12px;}
  .tbox-title{font-size:15px;font-weight:600;color:var(--txt);margin-bottom:4px;}
  .tbox-desc{font-size:13px;color:var(--txt2);line-height:1.6;}
  .rpe-pill{display:inline-block;font-size:11px;padding:3px 9px;border-radius:99px;margin-top:7px;background:var(--bg);color:var(--txt3);border:1px solid var(--border);}
  .meal-title{font-size:15px;font-weight:600;color:var(--txt);margin-bottom:2px;}
  .meal-sub{font-size:12px;color:var(--txt3);margin-bottom:10px;}
  .ing-list{list-style:disc;padding-left:18px;font-size:13px;color:var(--txt2);line-height:1.9;}
  .tips-txt{font-size:13px;color:var(--txt2);line-height:1.6;margin-top:8px;}
  .lft-notice{font-size:12px;padding:8px 11px;background:var(--amb-bg);border-radius:10px;color:var(--amb-txt);margin-top:10px;display:flex;align-items:center;gap:6px;}
  .divider{height:1px;background:var(--border);margin:14px 0;}
  .action-list{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
  .action-btn{display:flex;align-items:center;gap:10px;padding:12px;background:var(--card2);border-radius:12px;border:none;width:100%;font-size:14px;font-weight:500;color:var(--acc);cursor:pointer;-webkit-appearance:none;text-align:left;}
  .action-btn svg{flex-shrink:0;width:18px;height:18px;stroke:var(--acc);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
  .close-sheet{display:block;width:100%;padding:14px;margin-top:8px;background:var(--card2);border-radius:12px;border:none;font-size:15px;font-weight:500;color:var(--txt2);cursor:pointer;-webkit-appearance:none;}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <button class="nav-btn" id="prevBtn">&#8249; Prev</button>
    <span class="header-title" id="weekLabel">Week 1</span>
    <button class="nav-btn" id="nextBtn">Next &#8250;</button>
  </div>
  <div class="week-dots" id="weekDots"></div>
</div>

<div class="tog-row">
  <button class="tog on" id="togT">&#127939; Training</button>
  <button class="tog on" id="togM">&#127869; Meals</button>
</div>

<div class="stats" id="statsEl"></div>

<div class="legend">
  <div class="leg"><div class="ld" style="background:#ef4444"></div>Speed</div>
  <div class="leg"><div class="ld" style="background:#3b82f6"></div>Aerobic</div>
  <div class="leg"><div class="ld" style="background:#10b981"></div>Recovery</div>
  <div class="leg"><div class="ld" style="background:#8b5cf6"></div>Soccer</div>
  <div class="leg"><div class="ld" style="background:#f59e0b"></div>Match</div>
  <div class="leg"><div class="ld" style="background:#9ca3af"></div>Rest</div>
  <div class="leg"><div class="ld" style="background:#10b981"></div>Fresh cook</div>
  <div class="leg"><div class="ld" style="background:#f59e0b"></div>Leftovers</div>
</div>

<div class="cal-wrap">
  <div class="row-label">Mon &rarr; Thu</div>
  <div class="day-heads" style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:4px;">
    <div class="dh">Mon</div><div class="dh">Tue</div><div class="dh">Wed</div><div class="dh">Thu</div>
  </div>
  <div class="cal-row cal-row-1" id="calRow1"></div>
  <div class="row-label" style="margin-top:10px;">Fri &rarr; Sun</div>
  <div class="day-heads" style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:4px;">
    <div class="dh">Fri</div><div class="dh">Sat</div><div class="dh">Sun</div>
  </div>
  <div class="cal-row cal-row-2" id="calRow2"></div>
</div>

<div class="sheet-overlay" id="overlay"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-inner" id="sheetInner"></div>
</div>

<script>
var TR=[
  {day:"Mon",type:"recovery",label:"Recovery",title:"Easy aerobic run",desc:"25–30 min at very low effort. Flush out Sunday's match fatigue. No pressure on pace.",rpe:"RPE 3–4",dur:"25–30 min"},
  {day:"Tue",type:"speed",label:"Speed",title:"Soccer + sprint drills",desc:"Warm up 10 min. Before training: 4–6 × 20m acceleration sprints with full recovery. Let training handle the rest.",rpe:"RPE 7–8",dur:"+15 min pre-session"},
  {day:"Wed",type:"aerobic",label:"Aerobic",title:"Tempo run",desc:"30–35 min continuous. Comfortably hard — you can speak a few words but not chat. Builds your 90-min engine.",rpe:"RPE 6–7",dur:"30–35 min"},
  {day:"Thu",type:"soccer",label:"Training",title:"Soccer session",desc:"Training focus day — let the coach session do the work. Skip extra running; prioritise quality.",rpe:"RPE 7–8",dur:"Session only"},
  {day:"Fri",type:"speed",label:"Training",title:"Soccer + activation",desc:"After training: 6–8 × 30m strides at 80–85% pace — fast but not max. Primes legs for Sunday.",rpe:"RPE 6",dur:"+10 min post-session"},
  {day:"Sat",type:"rest",label:"Rest/Mobility",title:"Pre-match prep",desc:"Full rest or 15 min light walk + hip/hamstring mobility. No running — save legs for the game.",rpe:"RPE 1–2",dur:"Optional"},
  {day:"Sun",type:"match",label:"Match day",title:"Game",desc:"90 min of mixed-pace play counts as your long endurance + sprint session combined. High-intensity work done.",rpe:"RPE 8–9",dur:"90 min"}
];

var MEALS=[
  {id:1,name:"Thai basil pork rice",cuisine:"Thai",kcal:750,prep:"35 min",ingredients:["500g ground pork","3 cups jasmine rice","4 garlic cloves","4 Thai chillies","2 tbsp oyster sauce","1 tbsp fish sauce","1 tbsp soy sauce","1 tsp sugar","4 large eggs (fried)","1 cup Thai basil","cooking oil"],tips:"Fry the egg last so the yolk stays runny. Make extra rice — it reheats perfectly."},
  {id:2,name:"Mapo chicken with rice",cuisine:"Chinese (Sichuan)",kcal:720,prep:"30 min",ingredients:["400g chicken thigh diced","200g ground pork","3 cups jasmine rice","2 tbsp doubanjiang","1 tbsp fermented black beans","3 garlic cloves","1 tsp ginger","1 cup chicken stock","1 tsp Sichuan pepper"],tips:"Doubanjiang is the key — find it at an Asian grocer. Day 2 tastes even better."},
  {id:3,name:"Lamb shawarma bowl",cuisine:"Middle Eastern",kcal:800,prep:"40 min",ingredients:["500g lamb mince","2 cups jasmine rice","1 tbsp cumin","1 tsp paprika","1 tsp turmeric","1 tsp cinnamon","2 tomatoes","1 cucumber","hummus","flatbread","1 lemon"],tips:"Rub spices into lamb 30 min before cooking. All the sides add 200+ kcal easily."},
  {id:4,name:"Japanese beef curry",cuisine:"Japanese",kcal:850,prep:"45 min",ingredients:["400g beef chuck diced","3 cups jasmine rice","3 potatoes","3 carrots","1 onion","1 box S&B golden curry roux","500ml beef stock"],tips:"S&B Golden Curry roux is at Woolworths. Medium-hot is great. Freezes brilliantly."},
  {id:5,name:"Dan dan noodles",cuisine:"Chinese (Sichuan)",kcal:780,prep:"35 min",ingredients:["500g wheat noodles","300g ground pork","3 tbsp tahini","2 tbsp soy sauce","1 tbsp chilli oil","1 tbsp black vinegar","2 garlic cloves","1 tsp Sichuan pepper","spring onions"],tips:"Build the sauce in the bowl first, then toss hot noodles and pork through it."},
  {id:6,name:"Moroccan lamb tagine",cuisine:"North African",kcal:900,prep:"45 min",ingredients:["500g lamb shoulder diced","1 can chickpeas","1 can diced tomatoes","2 cups couscous","1 onion","3 garlic cloves","1 tsp cumin","1 tsp cinnamon","handful dried apricots","500ml chicken stock"],tips:"Everything in one pot. Better on day 2 after overnight resting."},
  {id:7,name:"Vietnamese pho bo",cuisine:"Vietnamese",kcal:750,prep:"40 min",ingredients:["300g beef sirloin thin sliced","200g flat rice noodles","1L beef stock","2 star anise","1 cinnamon stick","4 cloves","1 tbsp fish sauce","bean sprouts","Thai basil","lime","chilli"],tips:"Toast spices in a dry pan first. Let the hot broth cook the beef in the bowl."},
  {id:8,name:"Indian butter chicken",cuisine:"Indian",kcal:900,prep:"40 min",ingredients:["500g chicken thighs","1 can crushed tomatoes","200ml heavy cream","1 onion","3 garlic cloves","1 tbsp ginger","2 tbsp butter","2 tsp garam masala","1 tsp cumin","store-bought naan"],tips:"Marinate chicken in yogurt and spices 30 min minimum. Use heavy cream generously."},
  {id:9,name:"Bibimbap",cuisine:"Korean",kcal:780,prep:"40 min",ingredients:["3 cups jasmine rice","200g beef mince","2 tbsp gochujang","1 tbsp sesame oil","1 tbsp soy sauce","4 eggs","1 carrot","1 zucchini","1 cup spinach","bean sprouts","sesame seeds"],tips:"Sauté each veg separately in sesame oil. Press rice into hot pan for a crispy crust."},
  {id:10,name:"Taiwanese lu rou fan",cuisine:"Taiwanese",kcal:850,prep:"45 min",ingredients:["500g pork belly","3 cups jasmine rice","4 hard-boiled eggs","4 tbsp soy sauce","2 tbsp rice wine","2 tbsp sugar","3 garlic cloves","2 star anise","spring onions","bok choy"],tips:"Braise pork belly low and slow. The fat coats every grain of rice. Even better day 2."},
  {id:11,name:"Chicken laksa",cuisine:"Malaysian",kcal:820,prep:"35 min",ingredients:["400g chicken thighs","200g rice noodles","400ml coconut milk","500ml chicken stock","3 tbsp laksa paste","bean sprouts","hard-boiled eggs","lime","fresh chilli"],tips:"Good laksa paste does the work. Double the recipe — the broth deepens overnight."}
];

var PLAN=[
  {week:1,days:[{day:"Mon",date:1,mealId:1,lft:false},{day:"Tue",date:2,mealId:1,lft:true},{day:"Wed",date:3,mealId:2,lft:false},{day:"Thu",date:4,mealId:2,lft:true},{day:"Fri",date:5,mealId:3,lft:false},{day:"Sat",date:6,mealId:3,lft:true},{day:"Sun",date:7,mealId:4,lft:false}]},
  {week:2,days:[{day:"Mon",date:8,mealId:4,lft:true},{day:"Tue",date:9,mealId:5,lft:false},{day:"Wed",date:10,mealId:5,lft:true},{day:"Thu",date:11,mealId:6,lft:false},{day:"Fri",date:12,mealId:6,lft:true},{day:"Sat",date:13,mealId:7,lft:false},{day:"Sun",date:14,mealId:7,lft:true}]},
  {week:3,days:[{day:"Mon",date:15,mealId:8,lft:false},{day:"Tue",date:16,mealId:8,lft:true},{day:"Wed",date:17,mealId:9,lft:false},{day:"Thu",date:18,mealId:9,lft:true},{day:"Fri",date:19,mealId:10,lft:false},{day:"Sat",date:20,mealId:10,lft:true},{day:"Sun",date:21,mealId:11,lft:false}]}
];

var TC={rest:"tb-rest",recovery:"tb-recovery",aerobic:"tb-aerobic",speed:"tb-speed",soccer:"tb-soccer",match:"tb-match"};
var week=1,selDate=null,showT=true,showM=true;

function meal(id){return MEALS.find(function(m){return m.id===id;});}
function trn(day){return TR.find(function(t){return t.day===day;});}
function wd(){return PLAN.find(function(p){return p.week===week;});}

function renderDots(){
  var el=document.getElementById('weekDots');
  el.innerHTML='';
  [1,2,3].forEach(function(w){
    var d=document.createElement('button');
    d.className='wdot'+(w===week?' on':'');
    d.onclick=function(){week=w;selDate=null;render();};
    el.appendChild(d);
  });
}

function renderStats(){
  var data=wd();
  var avg=Math.round(data.days.reduce(function(s,d){return s+meal(d.mealId).kcal;},0)/data.days.length);
  var fc=data.days.filter(function(d){return !d.lft;}).length;
  document.getElementById('statsEl').innerHTML=
    '<div class="stat"><div class="stat-val">~'+avg+'</div><div class="stat-lbl">kcal avg / lunch</div></div>'+
    '<div class="stat"><div class="stat-val">'+fc+' cooks</div><div class="stat-lbl">fresh cooks this week</div></div>'+
    '<div class="stat"><div class="stat-val">3 hard</div><div class="stat-lbl">hard training days</div></div>'+
    '<div class="stat"><div class="stat-val">2 easy</div><div class="stat-lbl">recovery / rest days</div></div>';
}

function renderGrid(){
  var data=wd();
  var row1=document.getElementById('calRow1');
  var row2=document.getElementById('calRow2');
  row1.innerHTML='';
  row2.innerHTML='';
  data.days.forEach(function(d){
    var m=meal(d.mealId);
    var t=trn(d.day);
    var btn=document.createElement('button');
    btn.className='dc'+(selDate===d.date?' sel':'');
    var html='<div class="dnum">'+d.day+'</div>';
    if(showT&&t){
      html+='<div class="tb '+TC[t.type]+'"><div class="tl">'+t.label+'</div><div class="ts">'+t.dur+'</div></div>';
    }
    if(showM){
      var col=d.lft?'#f59e0b':'#10b981';
      html+='<div class="mb"><span class="fdot" style="background:'+col+'"></span><span class="mn">'+m.name+'</span><div class="mm">~'+m.kcal+' kcal</div></div>';
    }
    btn.innerHTML=html;
    (function(date){btn.onclick=function(){openSheet(date);};})(d.date);
    var isRow2=['Fri','Sat','Sun'].indexOf(d.day)>-1;
    (isRow2?row2:row1).appendChild(btn);
  });
}

function openSheet(date){
  var data=wd();
  var d=data.days.find(function(x){return x.date===date;});
  if(!d) return;
  selDate=date;
  renderGrid();
  var m=meal(d.mealId);
  var t=trn(d.day);

  var trHtml='';
  if(t){
    trHtml='<div class="sec-head">Training</div>'+
      '<div class="tbox">'+
      '<div class="tbox-title">'+t.title+'</div>'+
      '<div class="tbox-desc">'+t.desc+'</div>'+
      '<span class="rpe-pill">'+t.rpe+' &middot; '+t.dur+'</span>'+
      '</div><div class="divider"></div>';
  }

  var lftHtml=d.lft?'<div class="lft-notice">&#8635; Leftover day &mdash; reheat from yesterday\'s cook.</div>':'';

  var mealHtml='<div class="sec-head">Lunch</div>'+
    '<div class="meal-title">'+m.name+'</div>'+
    '<div class="meal-sub">'+m.cuisine+' &middot; ~'+m.kcal+' kcal &middot; '+m.prep+'</div>'+
    '<div class="sec-head">Ingredients (serves 2)</div>'+
    '<ul class="ing-list">'+m.ingredients.map(function(i){return '<li>'+i+'</li>';}).join('')+'</ul>'+
    '<div class="tips-txt">'+m.tips+'</div>'+lftHtml;

  document.getElementById('sheetInner').innerHTML=
    '<div class="sheet-title">'+d.day+', Day '+d.date+'</div>'+
    '<div class="sheet-sub">'+(t?t.label+' day':'Rest')+' &middot; '+(d.lft?'Leftovers':'Fresh cook')+'</div>'+
    trHtml+mealHtml+
    '<div class="divider"></div>'+
    '<div class="sec-head">Quick actions</div>'+
    '<div class="action-list">'+
      '<button class="action-btn" id="sa1"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>Full recipe for '+m.name+'</button>'+
      '<button class="action-btn" id="sa2"><svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>Week '+week+' shopping list</button>'+
      (t?'<button class="action-btn" id="sa3"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Warm-up for '+t.title+'</button>':'')+
    '</div>'+
    '<button class="close-sheet" id="closeSheet">Close</button>';

  document.getElementById('sa1').onclick=function(){closeSheet();alert('Ask Claude: "Full recipe for '+m.name+'"');};
  document.getElementById('sa2').onclick=function(){closeSheet();alert('Ask Claude: "Week '+week+' shopping list"');};
  var sa3=document.getElementById('sa3');
  if(sa3&&t) sa3.onclick=function(){closeSheet();alert('Ask Claude: "Warm-up for '+t.title+'"');};
  document.getElementById('closeSheet').onclick=closeSheet;

  var sheet=document.getElementById('sheet');
  var overlay=document.getElementById('overlay');
  sheet.style.display='block';
  overlay.className='sheet-overlay open';
  setTimeout(function(){sheet.className='sheet open';},10);
}

function closeSheet(){
  var sheet=document.getElementById('sheet');
  var overlay=document.getElementById('overlay');
  sheet.className='sheet';
  overlay.className='sheet-overlay';
  selDate=null;
  renderGrid();
  setTimeout(function(){sheet.style.display='none';},320);
}

function render(){
  document.getElementById('weekLabel').textContent='Week '+week;
  renderDots();
  renderStats();
  renderGrid();
}

document.getElementById('prevBtn').onclick=function(){if(week>1){week--;selDate=null;render();}};
document.getElementById('nextBtn').onclick=function(){if(week<3){week++;selDate=null;render();}};
document.getElementById('togT').onclick=function(){showT=!showT;this.className='tog'+(showT?' on':'');renderGrid();};
document.getElementById('togM').onclick=function(){showM=!showM;this.className='tog'+(showM?' on':'');renderGrid();};
document.getElementById('overlay').onclick=closeSheet;

render();
</script>
</body>
</html>
